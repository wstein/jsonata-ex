name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - elixir: "1.18"
            otp: "27"
          - elixir: "1.18"
            otp: "28"
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Restore deps and build cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-${{ matrix.elixir }}-${{ matrix.otp }}-

      - run: mix deps.get
      - run: mix format --check-formatted
      - run: mix deps.unlock --check-unused
      - run: mix compile --warnings-as-errors
      - run: mix credo --strict
      - run: mix test --cover

      # Clone the upstream conformance suite as a sibling (the loader resolves it
      # at ../jsonata relative to the checkout) and gate the whole-suite score.
      - name: Fetch the upstream conformance suite
        run: git clone --depth 1 --branch v2.2.1 https://github.com/jsonata-js/jsonata.git ../jsonata
      - name: Conformance scoreboard
        run: mix test --only conformance

      - name: Cache dialyzer PLT
        uses: actions/cache@v4
        with:
          path: priv/plts
          key: ${{ runner.os }}-plt-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('**/mix.lock') }}

      - run: mix dialyzer
